<style>
/* ── TOKENS ── */
:root{
  --black:#080808;--white:#f4f4f0;--grey-1:#141414;--grey-2:#1e1e1e;
  --grey-3:#2a2a2a;--grey-4:#444;--grey-5:#888;--grey-6:#bbb;
  --danger:#ff4444;--success:#44ff88;--warn:#ffcc44;--auto:#4488ff;
  --border:1px solid #2a2a2a;
  --sidebar-w:220px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}

/* Mobile: show only mobile-nav-btn, hide desktop-nav-btn */
.desktop-nav-btn{display:none!important;}
.mobile-nav-btn{display:flex;}

/* Desktop: show desktop-nav-btn, hide mobile-nav-btn and more button */
@media(min-width:768px){
  .mobile-nav-btn{display:none!important;}
  .desktop-nav-btn{display:flex!important;}
}

/* ── MOBILE LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;border-bottom:var(--border);position:sticky;top:0;z-index:100;background:var(--black);}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}
.topbar-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--grey-5);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.topbar-coach{font-family:'DM Mono',monospace;font-size:10px;color:var(--grey-5);}

.nav{display:flex;border-top:var(--border);position:sticky;bottom:0;background:var(--black);z-index:100;}
.nav-btn{flex:1;padding:14px 2px 12px;border:none;background:none;color:var(--grey-5);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:1px;text-transform:uppercase;transition:color 0.2s;border-top:2px solid transparent;}
.nav-btn.active{color:var(--white);border-top-color:var(--white);}
.nav-btn svg{width:18px;height:18px;}

.page{display:none;flex-direction:column;flex:1;animation:fadeIn 0.2s ease;}
.page.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ── DESKTOP LAYOUT ── */
@media(min-width:768px){
  body{overflow-x:hidden;}
  .app{max-width:100%;flex-direction:row;min-height:100vh;}

  /* Sidebar replaces bottom nav */
  .nav{flex-direction:column;width:var(--sidebar-w);min-height:100vh;border-top:none;border-right:var(--border);position:sticky;top:0;align-self:flex-start;padding:0;justify-content:flex-start;}
  .nav-btn{flex:0 0 auto;flex-direction:row;justify-content:flex-start;padding:14px 20px;border-top:none;border-left:3px solid transparent;font-size:9px;gap:10px;border-radius:0;width:100%;}
  .nav-btn.active{border-top-color:transparent;border-left-color:var(--white);}
  .nav-btn svg{width:16px;height:16px;flex-shrink:0;}
  .nav-logo{padding:24px 20px 20px;border-bottom:var(--border);}
  .nav-logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;}
  .nav-logo-sub{font-family:'DM Mono',monospace;font-size:8px;color:var(--grey-5);letter-spacing:2px;margin-top:2px;}
  .nav-logo-coach{font-family:'DM Mono',monospace;font-size:9px;color:var(--grey-4);margin-top:6px;}
  .nav-spacer{flex:1;}
  .nav-settings-btn{width:100%;padding:14px 20px;border:none;background:none;color:var(--grey-5);cursor:pointer;display:flex;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;border-top:var(--border);transition:color 0.2s;}
  .nav-settings-btn:hover{color:var(--white);}
  .nav-settings-btn svg{width:16px;height:16px;}

  /* Main content area */
  .desktop-main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:none;} /* topbar hidden on desktop — sidebar has logo */

  /* Page content gets a max comfortable reading width */
  .page{max-width:880px;}
  .page.active{display:flex;}

  /* Two-column profile layout on desktop */
  .desktop-two-col{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:var(--border);}
  .desktop-two-col > *{border-right:var(--border);}
  .desktop-two-col > *:last-child{border-right:none;}

  /* Wider radar */
  .radar-wrap canvas{max-width:340px!important;}

  /* Tier list side-by-side on desktop */
  .tier-desktop-split{display:grid;grid-template-columns:1fr 1fr;gap:0;}
  .tier-desktop-split .tier-band{border-right:var(--border);}
}

/* ── SHARED COMPONENTS ── */
.section-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--grey-5);padding:20px 20px 10px;}
.card{margin:0 20px 12px;background:var(--grey-1);border:var(--border);border-radius:2px;overflow:hidden;}
.card-body{padding:16px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border:var(--border);background:none;color:var(--white);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;border-radius:2px;}
.btn:hover{background:var(--grey-2);}
.btn-primary{background:var(--white);color:var(--black);border-color:var(--white);}
.btn-primary:hover{background:var(--grey-6);}
.btn-danger{border-color:var(--danger);color:var(--danger);}
.btn-danger:hover{background:rgba(255,68,68,0.08);}
.btn-muted{border-color:var(--grey-3);color:var(--grey-5);}
.btn-sm{padding:7px 12px;font-size:9px;}
.btn-full{width:100%;}

.tag{display:inline-block;padding:3px 8px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;border-radius:1px;}
.tag-role{background:var(--grey-3);color:var(--grey-6);}
.tag-win{background:rgba(68,255,136,0.1);color:var(--success);border:1px solid rgba(68,255,136,0.3);}
.tag-loss{background:rgba(255,68,68,0.1);color:var(--danger);border:1px solid rgba(255,68,68,0.3);}
.tag-tourney{background:rgba(244,244,240,0.08);color:var(--white);border:1px solid var(--grey-4);}
.tag-dnp{background:var(--grey-2);color:var(--grey-4);border:1px solid var(--grey-3);}

.grade{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;display:inline-block;}
.grade-sp{color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.8);}
.grade-s{color:#e8e8e8;}
.grade-sm{color:#c8c8c8;}
.grade-ap{color:#aaa;}
.grade-a{color:#888;}
.grade-am{color:#666;}

.input-group{margin-bottom:16px;}
.input-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--grey-5);margin-bottom:6px;display:block;}
.input{width:100%;padding:10px 12px;background:var(--grey-2);border:var(--border);color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;border-radius:2px;outline:none;transition:border-color 0.15s;}
.input:focus{border-color:var(--grey-5);}
select.input{appearance:none;cursor:pointer;}
textarea.input{resize:vertical;min-height:70px;}

.hero-search-wrap{position:relative;margin-bottom:16px;}
.hero-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--grey-2);border:var(--border);border-top:none;z-index:300;max-height:180px;overflow-y:auto;display:none;}
.hero-dropdown.open{display:block;}
.hero-option{padding:10px 12px;font-size:13px;cursor:pointer;transition:background 0.1s;border-bottom:var(--border);}
.hero-option:last-child{border-bottom:none;}
.hero-option:hover,.hero-option:active{background:var(--grey-3);}
.hero-option.new-hero{color:var(--grey-5);font-style:italic;}

.slider-wrap{display:flex;align-items:center;gap:12px;}
.slider{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:var(--grey-3);outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--white);border-radius:50%;cursor:pointer;}
.slider-val{font-family:'Bebas Neue',sans-serif;font-size:22px;min-width:28px;text-align:right;}

.step-indicator{display:flex;padding:16px 20px;gap:4px;}
.step-dot{flex:1;height:2px;background:var(--grey-3);transition:background 0.2s;}
.step-dot.active{background:var(--white);}
.step-dot.done{background:var(--grey-5);}
.step-dot.skipped{background:var(--grey-3);opacity:0.3;}
.draft-side-wrap{display:flex;gap:8px;margin-bottom:16px;}
.draft-side-btn{flex:1;padding:10px;border:var(--border);background:none;color:var(--grey-5);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all 0.15s;}
.draft-side-btn.blue-on{border-color:rgba(68,119,255,0.6);background:rgba(68,119,255,0.12);color:#7799ff;}
.draft-side-btn.red-on{border-color:rgba(255,68,68,0.6);background:rgba(255,68,68,0.12);color:#ff7777;}
.draft-grid{border:var(--border);border-radius:2px;margin-bottom:20px;}
.draft-col-headers{display:grid;grid-template-columns:1fr 1fr;border-bottom:var(--border);}
.draft-col-hdr{padding:9px 10px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;text-align:center;}
.draft-col-hdr.blue{color:#7799ff;border-right:var(--border);}
.draft-col-hdr.red{color:#ff7777;}
.draft-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:var(--border);}
.draft-row:last-child{border-bottom:none;}
.draft-cell{padding:8px 10px;}
.draft-cell.blue-cell{border-right:var(--border);}
.draft-cell-role{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--grey-5);margin-bottom:4px;}
.draft-cell-role.ours{color:var(--grey-6);}

.play-skip-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:var(--border);margin-bottom:16px;}
.play-skip-label{font-size:12px;color:var(--grey-5);}
.play-skip-btns{display:flex;gap:6px;}

.score-sec{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--grey-4);padding:10px 0 12px;border-bottom:var(--border);margin-bottom:14px;}
.score-sec span{color:var(--grey-5);font-size:7px;letter-spacing:1px;text-transform:none;}

.player-row{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:var(--border);cursor:pointer;transition:background 0.15s;}
.player-row:last-child{border-bottom:none;}
.player-row:hover{background:var(--grey-1);}
.player-avatar{width:38px;height:38px;border-radius:50%;background:var(--grey-3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--grey-6);flex-shrink:0;border:1px solid var(--grey-3);}
.player-info{flex:1;min-width:0;}
.player-ign{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-nick{font-family:'DM Mono',monospace;font-size:10px;color:var(--grey-5);margin-top:1px;}

.stat-row{display:flex;align-items:center;padding:9px 0;border-bottom:var(--border);}
.stat-row:last-child{border-bottom:none;}
.stat-name{font-size:11px;color:var(--grey-6);width:140px;flex-shrink:0;}
.stat-bar-wrap{flex:1;margin:0 10px;height:2px;background:var(--grey-3);}
.stat-bar{height:100%;background:var(--white);transition:width 0.4s ease;}
.stat-score{font-family:'DM Mono',monospace;font-size:12px;width:28px;text-align:right;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--white);color:var(--black);padding:10px 20px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;border-radius:2px;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:768px){.toast{bottom:24px;left:calc(var(--sidebar-w) + 40px);transform:translateY(20px);}
.toast.show{transform:translateY(0);}}

/* HOME */
.home-hero{padding:28px 20px 20px;border-bottom:var(--border);}
.home-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--grey-5);letter-spacing:2px;margin-bottom:6px;}
.home-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;line-height:1;}
.home-subtitle{font-size:12px;color:var(--grey-5);margin-top:6px;}
.quick-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--grey-3);border:var(--border);margin:20px;}
.quick-stat{background:var(--black);padding:14px 12px;}
.quick-stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;}
.quick-stat-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--grey-5);text-transform:uppercase;margin-top:2px;}

/* PROFILE */
.profile-hero{padding:20px;border-bottom:var(--border);display:flex;align-items:stretch;gap:16px;}
.profile-photo{width:100px;height:100px;border-radius:4px;background:var(--grey-3);flex-shrink:0;border:1px solid var(--grey-4);overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--grey-6);}
.profile-photo img{width:100%;height:100%;object-fit:cover;}
.profile-info-col{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;line-height:1;}
.profile-ign{font-family:'DM Mono',monospace;font-size:10px;color:var(--grey-5);margin-top:3px;}
.profile-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.profile-side-stats{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.profile-side-stat{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
.profile-side-stat-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--grey-5);text-transform:uppercase;}
.profile-side-stat-val{font-family:'Bebas Neue',sans-serif;font-size:18px;}
.grades-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--grey-3);border:var(--border);margin:20px;}
.grade-cell{background:var(--black);padding:14px 12px;text-align:center;}
.grade-cell-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--grey-5);text-transform:uppercase;margin-top:4px;}
.radar-wrap{display:flex;justify-content:center;padding:10px 0 20px;}

/* RADAR BREAKDOWN */
.radar-breakdown{margin:0 20px 12px;border:var(--border);}
.rbd-row{display:flex;align-items:flex-start;border-bottom:var(--border);}
.rbd-row:last-child{border-bottom:none;}
.rbd-pillar{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;padding:11px 12px;width:100px;flex-shrink:0;border-right:var(--border);background:var(--grey-1);}
.rbd-grade{font-family:'DM Mono',monospace;font-size:11px;padding:11px 10px;width:36px;flex-shrink:0;border-right:var(--border);text-align:center;}
.rbd-desc{font-size:10px;color:var(--grey-5);padding:11px 12px;line-height:1.5;flex:1;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--grey-1);border:var(--border);border-bottom:none;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;border-radius:4px 4px 0 0;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@media(min-width:768px){
  .modal-overlay{align-items:center;}
  .modal{border-radius:4px;border-bottom:var(--border);max-width:520px;max-height:85vh;}
}
/* BOOK MODAL — edit game */
.modal-book{overflow:hidden !important;display:flex;flex-direction:column;max-height:92vh;}
@media(min-width:768px){.modal-book{max-height:85vh;}}
.modal-book .modal-body{overflow:hidden;flex:1;display:flex;flex-direction:column;padding:0;min-height:0;}
.book-layout{display:flex;flex:1;overflow:hidden;min-height:0;}
.book-tabs{width:54px;flex-shrink:0;border-right:var(--border);background:var(--black);display:flex;flex-direction:column;}
.book-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;border:none;background:none;color:var(--grey-5);cursor:pointer;font-family:'DM Mono',monospace;font-size:6px;letter-spacing:1px;text-transform:uppercase;border-bottom:var(--border);transition:all 0.15s;}
.book-tab:last-child{border-bottom:none;}
.book-tab.active{background:var(--grey-1);color:var(--white);box-shadow:inset 3px 0 0 var(--white);}
.book-tab-num{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1;}
.book-content{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.book-panel{display:none;padding:16px 16px 8px;}
.book-panel.active{display:block;}
.book-footer{padding:14px 16px;border-top:var(--border);background:var(--grey-1);flex-shrink:0;}
.edit-player-chip{padding:6px 10px;border:var(--border);background:none;color:var(--grey-5);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all 0.15s;white-space:nowrap;}
.edit-player-chip.active{background:var(--white);color:var(--black);border-color:var(--white);}
.modal-header{padding:18px 20px;border-bottom:var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--grey-1);z-index:1;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}
.modal-close{background:none;border:none;color:var(--grey-5);cursor:pointer;font-size:20px;line-height:1;}
.modal-body{padding:20px;}

.back-btn{display:flex;align-items:center;gap:8px;padding:14px 20px;background:none;border:none;border-bottom:var(--border);color:var(--grey-5);cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;width:100%;transition:color 0.15s;}
.back-btn:hover{color:var(--white);}

.empty{text-align:center;padding:40px 20px;color:var(--grey-5);}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:0.4;}
.empty-text{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;}

.row{display:flex;gap:10px;}
.row>*{flex:1;}
.mt-8{margin-top:8px;}
.mt-16{margin-top:16px;}
.mb-0{margin-bottom:0;}
.divider{border:none;border-top:var(--border);margin:16px 0;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--grey-3);}

/* ALERT BANNER */
.alert-banner{margin:12px 20px 0;padding:12px 14px;border-radius:2px;display:flex;align-items:flex-start;gap:10px;font-size:12px;line-height:1.5;}
.alert-banner-warn{background:rgba(255,204,68,0.08);border:1px solid rgba(255,204,68,0.25);color:var(--warn);}
.alert-banner-danger{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.25);color:var(--danger);}
.alert-banner-dismiss{margin-left:auto;background:none;border:none;color:inherit;opacity:0.5;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;padding:0;}

/* TREND */
.trend-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:var(--border);}
.trend-row:last-child{border-bottom:none;}
.trend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.trend-up{background:var(--success);}
.trend-flat{background:var(--warn);}
.trend-down{background:var(--danger);}
.trend-pillar{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;width:110px;flex-shrink:0;}
.trend-label{font-size:11px;color:var(--grey-5);flex:1;}
.trend-delta{font-family:'DM Mono',monospace;font-size:11px;width:44px;text-align:right;flex-shrink:0;}
.trend-graph-wrap{padding:0 20px 20px;}

/* COMPARE */
.compare-table{margin:0 20px 16px;border:var(--border);}
.compare-table-row{display:grid;grid-template-columns:1fr 72px 72px;border-bottom:var(--border);}
.compare-table-row:last-child{border-bottom:none;}
.compare-table-header{background:var(--grey-1);}
.compare-table-cell{padding:9px 12px;font-size:11px;}
.compare-table-cell.mono{font-family:'DM Mono',monospace;font-size:11px;text-align:center;}
.compare-table-cell.header-cell{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--grey-5);text-transform:uppercase;text-align:center;}
.compare-winner{color:var(--white);font-weight:600;}
.compare-loser{color:var(--grey-4);}

/* SESSION SUMMARY */
.summary-best{display:flex;align-items:center;gap:14px;padding:16px;background:var(--grey-2);border-radius:2px;margin-bottom:14px;}

/* PLAYER EDIT */
.pfp-upload-wrap{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.pfp-preview{width:72px;height:72px;border-radius:4px;background:var(--grey-3);border:var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--grey-6);flex-shrink:0;}

<script>
'use strict';

// ══════════════════════════════════════════
// SUPABASE CLIENT
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://ihxnvlfilhcadqqcpqke.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloeG52bGZpbGhjYWRxcWNwcWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTI4NDEsImV4cCI6MjA5Mzc4ODg0MX0.c0gKpFDmSiNpjjm2rbnPybbz91-SqmLmAHArotgjbKI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// In-memory cache (loaded once on boot, kept in sync)
let _cache = {
  heroes: [],        // from heroes table
  customHeroes: [],  // from custom_heroes table
  heroOverrides: {}, // from app_settings key='hero_overrides'
  players: [],       // from players table
  games: [],         // from games table
  matches: [],       // from matches table
  tournaments: [],   // from tournaments table (stub, future)
  metaTiers: {},     // from meta_tiers table ({heroName: {role: tier}})
  masteryTiers: {},  // from mastery_tiers table (flattened to {playerId: {heroName: tier}})
  patches: [],       // from patches table
  pfp: {},           // from app_settings key='pfp'
  dismissed: {},     // localStorage only (UI state)
  sheetUrl: '',
  lastSync: '',
  loaded: false,
  settingsPin: '',   // from app_settings key='settings_pin'
  anthropicKey: '', // from app_settings key='anthropic_key'
  _pinUnlocked: false,
};

// Show/hide global loading overlay
function setLoading(on){
  let el=document.getElementById('global-loader');
  if(el) el.style.display=on?'flex':'none';
}

// Boot: load all data from Supabase into cache
async function bootApp(){
  setLoading(true);
  try{
    const [heroRes, customRes, playerRes, gameRes, matchRes, metaRes, masteryRes, patchRes, settingsRes] = await Promise.all([
      sb.from('heroes').select('*').order('name'),
      sb.from('custom_heroes').select('*').order('name'),
      sb.from('players').select('*').order('nick'),
      sb.from('games').select('*').order('created_at'),
      sb.from('matches').select('*').order('created_at',{ascending:false}),
      sb.from('meta_tiers').select('*'),
      sb.from('mastery_tiers').select('*'),
      sb.from('patches').select('*').order('saved_at'),
      sb.from('app_settings').select('*'),
    ]);
    _cache.heroes = (heroRes.data||[]).map(h=>({name:h.name,cls:h.cls,roles:h.roles||[]}));
    _cache.customHeroes = (customRes.data||[]).map(h=>({name:h.name,cls:h.cls,roles:h.roles||[]}));
    _cache.players = (playerRes.data||[]).map(p=>({
      id:p.id, ign:p.ign, nick:p.nick, role:p.role,
      status:p.active?(p.rank&&p.rank!=='Unranked'?p.rank:'Starter'):'Inactive',
      rank:p.rank||'Unranked', active:p.active
    }));
    _cache.games = (gameRes.data||[]).map(g=>({
      id:g.id, date:g.date, type:g.map||'Scrim', gameNum:g.game_num||1, gameName:g.game_name||'',
      result:g.result==='W'?'Win':'Loss',
      opponent:g.opponent||'', oppTier:'', notes:g.notes||'',
      playerScores:g.player_scores||{},
      matchMentality:g.match_mentality||{},
      matchId:g.match_id||null,
      mvpPlayerId:g.mvp_player_id||null,
      savedAt:g.created_at
    }));
    _cache.matches = (matchRes.data||[]).map(m=>({
      id:m.id, name:m.name, date:m.date||'', type:m.type||'Scrim',
      oppTier:m.opp_tier||'', notes:m.notes||'',
      mentality:m.mentality||{},
      tournamentId:m.tournament_id||null,
      createdAt:m.created_at,
    }));
    // Flatten meta tiers: {heroName: {role: tier}}
    _cache.metaTiers={};
    (metaRes.data||[]).forEach(r=>{
      if(r.role){
        if(!_cache.metaTiers[r.hero_name]) _cache.metaTiers[r.hero_name]={};
        _cache.metaTiers[r.hero_name][r.role]=r.tier;
      }
    });
    // Flatten mastery tiers
    _cache.masteryTiers={};
    (masteryRes.data||[]).forEach(r=>{
      if(!_cache.masteryTiers[r.player_id]) _cache.masteryTiers[r.player_id]={};
      _cache.masteryTiers[r.player_id][r.hero_name]=r.tier;
    });
    _cache.patches=(patchRes.data||[]).map(p=>({name:p.name,savedAt:p.saved_at,metaTiers:p.meta_snapshot||{}}));
    // Settings
    (settingsRes.data||[]).forEach(s=>{
      if(s.key==='hero_overrides') _cache.heroOverrides=s.value||{};
      if(s.key==='pfp') _cache.pfp=s.value||{};
      if(s.key==='sheet_url') _cache.sheetUrl=s.value||'';
      if(s.key==='last_sync') _cache.lastSync=s.value||'';
      if(s.key==='settings_pin') _cache.settingsPin=s.value||'';
      if(s.key==='anthropic_key') _cache.anthropicKey=(s.value||'').replace(/\s+/g,'');
      if(s.key==='meta_tiers_json'&&s.value&&!Object.keys(_cache.metaTiers).length) _cache.metaTiers=s.value;
    });
    // If no players in DB yet, seed with defaults
    if(_cache.players.length===0){
      await seedDefaultPlayers();
    }
    _cache.dismissed=JSON.parse(localStorage.getItem('ps_dismissed')||'{}');
    _cache.loaded=true;
  }catch(e){
    console.error('Boot failed',e);
    showToast('⚠ Could not connect to Supabase');
  }
  setLoading(false);
  PLAYERS=_cache.players;
  initLayout();
  renderHome();
}

async function seedDefaultPlayers(){
  const defaults=[
    {id:'gun', ign:'Sutthiphat',nick:'Gun', role:'Support', rank:'Unranked', active:true},
    {id:'film',ign:'K1rarz',    nick:'Film',role:'Midlane', rank:'Unranked', active:true},
    {id:'yp',  ign:'Penii',     nick:'YP',  role:'Carry',   rank:'Unranked', active:true},
    {id:'poom',ign:'WildMutt',  nick:'Poom',role:'Offlane', rank:'Unranked', active:true},
    {id:'doy', ign:'Doy',       nick:'Doy', role:'Jungler', rank:'Unranked', active:true},
    {id:'ice', ign:'Ackerman',  nick:'Ice', role:'Jungler', rank:'Unranked', active:false},
    {id:'ken', ign:'Kenslayer', nick:'Ken', role:'Offlane', rank:'Unranked', active:false},
  ];
  await sb.from('players').upsert(defaults,{onConflict:'id'});
  _cache.players=defaults.map(p=>({...p,status:p.active?'Starter':'Substitute'}));
}

  await sb.from('app_settings').upsert({key,value,updated_at:new Date().toISOString()},{onConflict:'key'});
}

async function sbSaveGame(gameObj){
  // Map app game object → DB row
  const row={
    id: gameObj.id,
    date: gameObj.date,
    result: gameObj.result==='Win'?'W':'L',
    map: gameObj.type||'Scrim',
    opponent: gameObj.opponent||null,
    is_tournament: gameObj.type==='Tournament',
    notes: gameObj.notes||null,
    game_num: gameObj.gameNum||1,
    game_name: gameObj.gameName||null,
    player_scores: gameObj.playerScores||{},
    match_mentality: gameObj.matchMentality||{},
    match_id: gameObj.matchId||null,
    mvp_player_id: gameObj.mvpPlayerId||null,
  };
  const {data,error}=await sb.from('games').upsert(row,{onConflict:'id'}).select().single();
  if(error) throw error;
  return data.id;
}

async function sbDeleteGame(gameId){
  await sb.from('games').delete().eq('id',gameId);
}

async function sbSavePlayer(playerObj){
  const row={
    id:playerObj.id, ign:playerObj.ign, nick:playerObj.nick,
    role:playerObj.role, active:playerObj.status!=='Inactive',
    rank:playerObj.rank||'Unranked',
  };
  await sb.from('players').upsert(row,{onConflict:'id'});
}

async function sbDeletePlayer(playerId){
  await sb.from('players').delete().eq('id',playerId);
}

async function sbSaveMetaTier(heroName,role,tier){
  if(tier){
    await sb.from('meta_tiers').upsert({hero_name:heroName,role:role,tier,updated_at:new Date().toISOString()},{onConflict:'hero_name,role'});
  } else {
    await sb.from('meta_tiers').delete().eq('hero_name',heroName).eq('role',role);
  }
}

async function sbSaveMasteryTier(playerId,heroName,tier){
  if(tier){
    await sb.from('mastery_tiers').upsert({player_id:playerId,hero_name:heroName,tier,updated_at:new Date().toISOString()},{onConflict:'player_id,hero_name'});
  } else {
    await sb.from('mastery_tiers').delete().eq('player_id',playerId).eq('hero_name',heroName);
  }
}

async function sbSaveHeroes(heroArr){
  if(!heroArr.length) return;
  const rows=heroArr.map(h=>({name:h.name,cls:h.cls,roles:h.roles}));
  await sb.from('heroes').upsert(rows,{onConflict:'name'});
}

async function sbSaveCustomHero(h){
  await sb.from('custom_heroes').upsert({name:h.name,cls:h.cls,roles:h.roles},{onConflict:'name'});
}

async function sbSavePatch(p){
  await sb.from('patches').upsert({name:p.name,meta_snapshot:p.metaTiers,saved_at:p.savedAt},{onConflict:'name'});
}

async function sbSaveMatch(matchObj){
  const row={
    id:matchObj.id,
    name:matchObj.name,
    date:matchObj.date||null,
    type:matchObj.type||'Scrim',
    opp_tier:matchObj.oppTier||null,
    notes:matchObj.notes||null,
    mentality:matchObj.mentality||null,
    tournament_id:matchObj.tournamentId||null,
  };
  const {data,error}=await sb.from('matches').upsert(row,{onConflict:'id'}).select().single();
  if(error) throw error;
  return data.id;
}

async function sbDeleteMatch(matchId){
  // Unlink games first, then delete match
  await sb.from('games').update({match_id:null}).eq('match_id',matchId);
  await sb.from('matches').delete().eq('id',matchId);
}

async function sbAssignGameToMatch(gameId,matchId){
  const {error}=await sb.from('games').update({match_id:matchId}).eq('id',gameId);
  if(error) throw error;
}

// SETTINGS PIN — V7
// ══════════════════════════════════════════
function submitPin(){
  var entered=(document.getElementById('pin-entry-inp')?.value||'').trim();
  if(entered===String(_cache.settingsPin)){
    _cache._pinUnlocked=true;
    setTimeout(function(){_cache._pinUnlocked=false;},5*60*1000);
    closeModal('pin-entry-modal');
    showPage('page-settings');
  } else {
    document.getElementById('pin-entry-err').style.display='block';
  }
}

function showPinChange(){
  document.getElementById('pin-new-inp').value='';
  document.getElementById('pin-confirm-inp').value='';
  document.getElementById('pin-change-err').style.display='none';
  document.getElementById('pin-change-modal').classList.add('open');
}

async function savePin(){
  var nw=(document.getElementById('pin-new-inp')?.value||'').trim();
  var cf=(document.getElementById('pin-confirm-inp')?.value||'').trim();
  var errEl=document.getElementById('pin-change-err');
  if(!/^\d{4,8}$/.test(nw)){errEl.textContent='PIN must be 4–8 digits';errEl.style.display='block';return;}
  if(nw!==cf){errEl.textContent='PINs do not match';errEl.style.display='block';return;}
  _cache.settingsPin=nw;
  _cache._pinUnlocked=true;
  await sbSaveSetting('settings_pin',nw);
  closeModal('pin-change-modal');
  showToast('PIN saved');
}

async function clearPin(){
  _cache.settingsPin='';
  _cache._pinUnlocked=false;
  await sbSaveSetting('settings_pin','');
  closeModal('pin-change-modal');
  showToast('PIN removed');
}
</script>
