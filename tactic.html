<!DOCTYPE html>
<!-- TACTIC BOARD v1.0 — tactic.html -->
<!--
  Single-file tactic board for esport drafting / positioning.
  Everything (CSS + JS) is inline. The only external things it touches are:
    - assets already in the project (map, dragon/slayer/vanguard icons, hero_icons)
    - the Supabase JS library (loaded from CDN) for Save / Load
  Tower positions live in the TOWER_POSITIONS constant near the top so they are
  easy to nudge later.
-->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tactic Board — Sucrose</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Supabase library (same CDN version index-v2.html uses) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ─────────────────────────────────────────────
   THEME — mirrors style.css variables so this page
   feels like the rest of the site.
   ───────────────────────────────────────────── */
:root{
  --black:#080808; --white:#f4f4f0;
  --grey-1:#141414; --grey-2:#1e1e1e; --grey-3:#2a2a2a; --grey-4:#444; --grey-5:#888; --grey-6:#bbb;
  --blue:#4488FF; --red:#FF4444;
  --tower-blue:#64B5F6; --tower-red:#FF7043;
  --border:1px solid #2a2a2a;
  /* Dragon recolor: the source art is purple — this filter pushes it to yellow/gold.
     Tweak the hue-rotate value if you want a different shade. */
  --dragon-filter: hue-rotate(150deg) saturate(1.6) brightness(1.15);
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  background:var(--black); color:var(--white);
  font-family:'DM Sans',sans-serif; font-size:13px;
  overflow:auto; /* auto, not hidden — Safari's address bar changes the real
    visible height after 100vh is computed, so this is a safety net that lets
    you scroll to the top bar / toolbar if that ever clips instead of them
    becoming permanently unreachable. */
}
button{font-family:inherit;}

/* generic button look (from style.css .btn) */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border:var(--border);background:none;color:var(--white);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;border-radius:2px;}
.btn:hover{background:var(--grey-2);}
.btn.active{background:var(--white);color:var(--black);border-color:var(--white);}
.btn-sm{padding:6px 10px;font-size:9px;}
.btn-primary{background:var(--white);color:var(--black);border-color:var(--white);}
.btn-primary:hover{background:var(--grey-6);}
.btn-danger{border-color:var(--red);color:var(--red);}
.btn-danger:hover{background:rgba(255,68,68,.08);}

/* ─────────── App shell ─────────── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;min-height:100vh;min-height:100dvh;}
#topbar{display:flex;align-items:center;gap:14px;padding:8px 16px;border-bottom:var(--border);background:var(--grey-1);flex:0 0 auto;}
#topbar h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin:0;}
#topbar .sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--grey-5);letter-spacing:1px;}
#topbar a.back{margin-left:auto;color:var(--grey-5);text-decoration:none;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;}
#topbar a.back:hover{color:var(--white);}

#mid{display:flex;flex:1 1 auto;min-height:0;}

/* Panels */
.panel{background:rgba(20,20,20,.92);border-right:var(--border);display:flex;flex-direction:column;flex:0 0 auto;transition:width .18s ease;min-height:0;}
#rightPanel{border-right:none;border-left:var(--border);}
.panel.collapsed{width:34px !important;}
.panel-head{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:var(--border);flex:0 0 auto;}
.panel-head .ttl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--grey-6);white-space:nowrap;overflow:hidden;}
.panel-toggle{margin-left:auto;width:22px;height:22px;border:var(--border);background:none;color:var(--grey-5);cursor:pointer;border-radius:2px;flex:0 0 auto;font-size:12px;line-height:1;}
.panel-toggle:hover{color:var(--white);background:var(--grey-2);}
.panel.collapsed .panel-head{flex-direction:column;padding:8px 4px;gap:10px;}
.panel.collapsed .panel-head .ttl{writing-mode:vertical-rl;transform:rotate(180deg);letter-spacing:2px;}
.panel.collapsed .panel-toggle{margin-left:0;}
.panel-body{flex:1 1 auto;overflow-y:auto;min-height:0;}
.panel.collapsed .panel-body{display:none;}

#leftPanel{width:230px;}
#rightPanel{width:230px;}

/* ─────────── Hero panel ─────────── */
.pos-tabs{display:flex;flex-wrap:wrap;gap:3px;padding:8px;}
.pos-tabs .tab{flex:1 1 auto;padding:5px 0;text-align:center;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;border:var(--border);border-radius:2px;cursor:pointer;color:var(--grey-5);background:none;}
.pos-tabs .tab.active{background:var(--white);color:var(--black);border-color:var(--white);}
.hero-search{margin:0 8px 8px;width:calc(100% - 16px);padding:7px 9px;background:var(--grey-1);border:var(--border);color:var(--white);border-radius:2px;font-family:'DM Mono',monospace;font-size:11px;}
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 8px 12px;}
.hero-cell{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px;border-radius:4px;}
.hero-cell:hover{background:var(--grey-2);}
.hero-portrait{width:46px;height:46px;border-radius:50%;overflow:hidden;position:relative;background:var(--grey-3);display:flex;align-items:center;justify-content:center;border:1px solid var(--grey-4);}
.hero-portrait img{width:100%;height:100%;object-fit:cover;position:relative;z-index:2;}
.hero-portrait .init{font-family:'DM Mono',monospace;font-size:14px;color:var(--grey-6);position:absolute;z-index:1;}
.hero-cell .nm{font-family:'DM Mono',monospace;font-size:8px;text-align:center;line-height:1.1;color:var(--grey-6);max-width:54px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.section-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--grey-5);padding:4px 10px 2px;text-transform:uppercase;}

/* ─────────── Map ─────────── */
#mapWrap{flex:1 1 auto;position:relative;min-width:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;padding:8px;}
#mapBox{position:relative;background:#000;box-shadow:0 0 0 1px var(--grey-3);}
#mapImg{display:block;width:100%;height:100%;position:absolute;inset:0;object-fit:fill;user-select:none;-webkit-user-drag:none;}
#drawCanvas{position:absolute;inset:0;z-index:50;touch-action:none;}
.tower{position:absolute;transform:translate(-50%,-50%);z-index:20;pointer-events:none;}
.objective,.token{position:absolute;transform:translate(-50%,-50%);z-index:30;user-select:none;}
.objective img{width:100%;height:100%;object-fit:contain;-webkit-user-drag:none;pointer-events:none;}
.token img{width:100%;height:100%;-webkit-user-drag:none;pointer-events:none;}
.token{z-index:40;cursor:grab;display:flex;flex-direction:column;align-items:center;}
.token.dragging{cursor:grabbing;z-index:60;}
.token .ring{border-radius:50%;overflow:hidden;width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center;background:var(--grey-3);}
.token.blue .ring{box-shadow:0 0 0 3px var(--blue),0 0 8px rgba(68,136,255,.6);}
.token.red  .ring{box-shadow:0 0 0 3px var(--red),0 0 8px rgba(255,68,68,.6);}
.token .ring img{width:100%;height:100%;object-fit:cover;position:relative;z-index:2;}
.token .ring .init{position:absolute;font-family:'DM Mono',monospace;color:var(--grey-6);z-index:1;}
.token .lbl{font-family:'DM Mono',monospace;font-size:9px;margin-top:2px;color:var(--white);text-shadow:0 1px 3px #000;white-space:nowrap;}
.objective{cursor:default;}
.objective.draggable{cursor:grab;}
#dragonIcon img{filter:var(--dragon-filter);}
.summon-token{position:absolute;transform:translate(-50%,-50%);z-index:45;cursor:grab;width:36px;height:36px;}
.summon-token.dragging{cursor:grabbing;z-index:60;}

/* ─────────── Bench ─────────── */
#bench{flex:0 0 auto;background:rgba(20,20,20,.95);border-top:var(--border);transition:height .18s ease;}
#bench.collapsed .bench-body{display:none;}
.bench-head{display:flex;align-items:center;gap:10px;padding:5px 14px;border-bottom:var(--border);}
.bench-head .ttl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--grey-6);text-transform:uppercase;}
.bench-head .hint{font-family:'DM Mono',monospace;font-size:9px;color:var(--grey-5);}
.bench-body{display:flex;flex-direction:column;gap:4px;padding:8px 14px;}
.bench-row{display:flex;align-items:center;gap:8px;min-height:54px;}
.bench-row .side-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;width:42px;flex:0 0 auto;}
.bench-row.blue .side-lbl{color:var(--blue);}
.bench-row.red .side-lbl{color:var(--red);}
.bench-tokens{display:flex;gap:10px;flex-wrap:wrap;flex:1 1 auto;}
.bench-token{position:relative;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.bt-rm{position:absolute;top:-5px;right:4px;width:15px;height:15px;border-radius:50%;background:var(--grey-2);border:1px solid var(--grey-4);color:var(--grey-6);font-size:10px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;z-index:1;}
.bt-rm:hover{color:var(--red);border-color:var(--red);}
.selected-for-place{outline:2px solid var(--blue);outline-offset:2px;border-radius:4px;}
.bench-token .ring{border-radius:50%;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;background:var(--grey-3);}
.bench-token.blue .ring{box-shadow:0 0 0 3px var(--blue);}
.bench-token.red .ring{box-shadow:0 0 0 3px var(--red);}
.bench-token .ring img{width:100%;height:100%;object-fit:cover;position:relative;z-index:2;}
.bench-token .ring .init{position:absolute;font-family:'DM Mono',monospace;color:var(--grey-6);z-index:1;}
.bench-token .nm{font-family:'DM Mono',monospace;font-size:8px;color:var(--grey-6);max-width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bench-empty{font-family:'DM Mono',monospace;font-size:9px;color:var(--grey-6);font-style:italic;}

/* ─────────── Toolbar ─────────── */
#toolbar{flex:0 0 auto;display:flex;align-items:center;gap:18px;padding:7px 14px;background:var(--grey-1);border-top:var(--border);flex-wrap:wrap;}
.tool-cluster{display:flex;align-items:center;gap:6px;}
.tool-cluster .sep{width:1px;height:22px;background:var(--grey-3);}
.tool-cluster .lab{font-family:'DM Mono',monospace;font-size:8px;color:var(--grey-5);letter-spacing:1px;text-transform:uppercase;margin-right:2px;}
.swatch{width:20px;height:20px;border-radius:3px;border:2px solid var(--grey-3);cursor:pointer;}
.swatch.active{border-color:var(--white);transform:scale(1.12);}
input[type=range]{accent-color:var(--blue);cursor:pointer;}
.pen-only{display:flex;align-items:center;gap:6px;transition:opacity .15s;}
.pen-only.disabled{opacity:.35;pointer-events:none;}
#rightActions{margin-left:auto;display:flex;gap:6px;}

/* ─────────── Hero pick popup ─────────── */
.mini-pop{position:fixed;z-index:2000;background:var(--grey-1);border:var(--border);border-radius:4px;padding:10px;box-shadow:0 8px 30px rgba(0,0,0,.6);display:flex;flex-direction:column;gap:8px;}
.mini-pop .ph{font-family:'DM Mono',monospace;font-size:10px;color:var(--grey-6);text-align:center;}
.mini-pop .row{display:flex;gap:6px;}

/* ─────────── Modals ─────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:3000;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--grey-1);border:var(--border);border-radius:6px;width:min(680px,92vw);max-height:86vh;display:flex;flex-direction:column;}
.modal-head{display:flex;align-items:center;padding:14px 18px;border-bottom:var(--border);}
.modal-head h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;margin:0;}
.modal-head .x{margin-left:auto;cursor:pointer;color:var(--grey-5);font-size:20px;background:none;border:none;}
.modal-head .x:hover{color:var(--white);}
.modal-body{padding:16px 18px;overflow-y:auto;}
.modal-search{width:100%;padding:9px 11px;background:var(--grey-2);border:var(--border);color:var(--white);border-radius:3px;font-family:'DM Mono',monospace;font-size:12px;margin-bottom:12px;}
.scenario-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.scenario-card{border:var(--border);border-radius:4px;overflow:hidden;cursor:pointer;background:var(--grey-2);}
.scenario-card:hover{border-color:var(--blue);}
.scenario-card img{width:100%;height:110px;object-fit:cover;background:#000;display:block;}
.scenario-card .cap{padding:6px 8px;font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:6px;}
.scenario-card .cap .del{margin-left:auto;color:var(--grey-5);cursor:pointer;}
.scenario-card .cap .del:hover{color:var(--red);}
.import-list{display:flex;flex-direction:column;gap:2px;}
.import-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:var(--border);border-radius:3px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;}
.import-row:hover{background:var(--grey-2);border-color:var(--blue);}
.import-row .date{color:var(--grey-5);font-size:10px;width:84px;flex:0 0 auto;}
.import-row .vs{flex:1 1 auto;}
.import-row .gm{color:var(--grey-5);font-size:10px;}
.note{font-family:'DM Mono',monospace;font-size:10px;color:var(--grey-5);line-height:1.5;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--grey-2);border:var(--border);border-radius:4px;padding:10px 18px;font-family:'DM Mono',monospace;font-size:11px;z-index:4000;box-shadow:0 6px 24px rgba(0,0,0,.5);}
.toast.err{border-color:var(--red);color:#ffb3b3;}

/* Towers tab grids */
.tower-side{margin-bottom:14px;}
.tower-side h4{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;margin:0 0 6px;}
.tower-side.blue h4{color:var(--tower-blue);}
.tower-side.red h4{color:var(--tower-red);}
.tower-grid{display:grid;grid-template-columns:auto repeat(3,1fr);gap:3px;}
.tower-grid .hc{font-family:'DM Mono',monospace;font-size:8px;color:var(--grey-5);text-align:center;padding:3px;cursor:pointer;user-select:none;}
.tower-grid .hc:hover{color:var(--white);}
.tower-grid .rh{text-align:left;}
.tower-grid .cell{display:flex;align-items:center;justify-content:center;padding:4px 0;}
.tower-grid input{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;}
.summon-src{display:flex;align-items:center;gap:10px;padding:8px;border:var(--border);border-radius:4px;margin-bottom:8px;cursor:grab;}
.summon-src:hover{background:var(--grey-2);}
.summon-src .vis{width:36px;height:36px;flex:0 0 auto;}
.summon-src .meta{font-family:'DM Mono',monospace;font-size:10px;}
.summon-src .meta small{display:block;color:var(--grey-5);font-size:8px;}
.trash-zone{margin-top:10px;border:1px dashed var(--grey-4);border-radius:4px;padding:14px;text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--grey-5);}
.trash-zone.over{border-color:var(--red);color:var(--red);background:rgba(255,68,68,.06);}
.toggle-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 11px;border:var(--border);border-radius:3px;background:none;color:var(--white);cursor:pointer;margin-bottom:8px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;}
.toggle-btn .dot{width:10px;height:10px;border-radius:50%;background:var(--grey-4);flex:0 0 auto;}
.toggle-btn.on{border-color:var(--blue);}
.toggle-btn.on .dot{background:var(--blue);box-shadow:0 0 6px var(--blue);}
.env-tabs{display:flex;gap:4px;padding:8px;}
.env-tabs .tab{flex:1;padding:6px 0;text-align:center;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;border:var(--border);border-radius:2px;cursor:pointer;color:var(--grey-5);}
.env-tabs .tab.active{background:var(--white);color:var(--black);}
.env-pane{padding:0 10px 14px;}
.size-row{padding:10px;border-bottom:var(--border);}
.size-row label{font-family:'DM Mono',monospace;font-size:9px;color:var(--grey-5);letter-spacing:1px;display:block;margin-bottom:5px;}
.size-row .rr{display:flex;align-items:center;gap:8px;}
.size-row input[type=range]{flex:1;}
.size-row .val{font-family:'DM Mono',monospace;font-size:10px;width:34px;text-align:right;}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <h1>Tactic Board</h1>
    <span class="sub">v1.0</span>
    <a class="back" href="index-v2.html">← back to app</a>
  </div>

  <div id="mid">

    <!-- LEFT: HERO PANEL -->
    <div class="panel" id="leftPanel">
      <div class="panel-head">
        <span class="ttl">Heroes</span>
        <button class="panel-toggle" onclick="togglePanel('leftPanel')" title="Collapse / expand">‹</button>
      </div>
      <div class="panel-body">
        <div class="pos-tabs" id="posTabs"></div>
        <input class="hero-search" id="heroSearch" placeholder="search hero…" oninput="renderHeroGrid()"/>
        <div id="recentWrap"></div>
        <div class="section-label" id="allLabel">All heroes</div>
        <div class="hero-grid" id="heroGrid"></div>
      </div>
    </div>

    <!-- CENTER: MAP -->
    <div id="mapWrap">
      <div id="mapBox">
        <img id="mapImg" src="assets/tactic-map.png" alt="map" draggable="false"/>
        <!-- towers, objectives, tokens injected here -->
        <canvas id="drawCanvas"></canvas>
      </div>
    </div>

    <!-- RIGHT: ENV CONTROLS -->
    <div class="panel" id="rightPanel">
      <div class="panel-head">
        <span class="ttl">Environment</span>
        <button class="panel-toggle" onclick="togglePanel('rightPanel')" title="Collapse / expand">›</button>
      </div>
      <div class="panel-body">
        <div class="env-tabs">
          <div class="tab active" data-env="summons" onclick="setEnvTab('summons')">Summons</div>
          <div class="tab" data-env="towers" onclick="setEnvTab('towers')">Towers</div>
        </div>

        <!-- Summons pane -->
        <div class="env-pane" id="envSummons">
          <button class="toggle-btn on" id="tglDragon" onclick="toggleObjective('dragon')"><span class="dot"></span> Dragon</button>
          <button class="toggle-btn on" id="tglSlayer" onclick="toggleObjective('slayer')"><span class="dot"></span> Slayer</button>

          <div class="section-label" style="padding-left:0;">Drag onto map →</div>
          <div class="summon-src" draggable="true" data-summon="vanguard">
            <div class="vis" id="vgVis"></div>
            <div class="meta">Vanguard<small>drag, or tap then tap map</small></div>
          </div>
          <div class="summon-src" draggable="true" data-summon="darkslayer">
            <div class="vis" id="dsVis"></div>
            <div class="meta">Summoned Darkslayer<small>drag, or tap then tap map</small></div>
          </div>

          <div class="trash-zone" id="trashZone">🗑 drop summon here to delete</div>
        </div>

        <!-- Towers pane -->
        <div class="env-pane" id="envTowers" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- BENCH -->
  <div id="bench">
    <div class="bench-head">
      <span class="ttl">Bench</span>
      <span class="hint">drag onto map, or tap then tap the map · × to remove</span>
      <button class="panel-toggle" style="margin-left:auto;" onclick="toggleBench()">⌄</button>
    </div>
    <div class="bench-body">
      <div class="bench-row blue"><span class="side-lbl">BLUE</span><div class="bench-tokens" id="benchBlue"></div></div>
      <div class="bench-row red"><span class="side-lbl">RED</span><div class="bench-tokens" id="benchRed"></div></div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <div class="tool-cluster">
      <span class="lab">Tool</span>
      <button class="btn btn-sm active" id="toolDrag" onclick="setTool('drag')" title="Drag heroes (A)">Drag</button>
      <button class="btn btn-sm" id="toolPen" onclick="setTool('pen')" title="Draw (S)">Pen</button>
      <button class="btn btn-sm" id="toolEraser" onclick="setTool('eraser')" title="Erase (D)">Eraser</button>
    </div>
    <div class="tool-cluster pen-only disabled" id="penOpts">
      <span class="lab">Size</span>
      <input type="range" min="2" max="30" value="5" id="penSize" oninput="penState.size=+this.value"/>
      <span class="sep"></span>
      <span class="lab">Color</span>
      <span id="swatches" style="display:flex;gap:5px;"></span>
    </div>
    <div id="rightActions">
      <button class="btn btn-sm" onclick="undoStroke()" title="Undo drawing (Ctrl+Z)">Undo</button>
      <button class="btn btn-sm" onclick="redoStroke()" title="Redo drawing (Ctrl+Shift+Z)">Redo</button>
      <button class="btn btn-sm btn-danger" onclick="clearDrawing()">Clear Drawing</button>
      <span class="sep"></span>
      <button class="btn btn-sm btn-primary" onclick="openSave()" title="Save (Ctrl+S)">Save</button>
      <button class="btn btn-sm" onclick="openLoad()">Load</button>
      <button class="btn btn-sm" onclick="openImport()">Import Draft</button>
      <span class="sep"></span>
      <button class="btn btn-sm" onclick="openShortcuts()" title="Keyboard shortcuts">⌨</button>
    </div>
  </div>
</div>

<script>
'use strict';

// Shared passcode gate for Save / Overwrite / Delete — keeps casual visitors
// from touching saved scenarios while Load/view stays open to anyone with the
// link. This is a lightweight speed bump, not real security (it's client-side
// and anyone reading this file can see it). Uses the SAME PIN as the main
// site's Settings page (Supabase app_settings, key='settings_pin') so there's
// only one passcode for the coach to manage — see loadData() for the fetch.
let SITE_PIN=null;   // null = not loaded yet / fetch failed, '' = no PIN set on main site

// action: 'save' | 'delete'. cb runs once the passcode is confirmed (or was
// already unlocked earlier this tab).
function gate(action,cb){
  if(sessionStorage.getItem('tactic_pw_ok')==='1'){ cb(); return; }
  if(SITE_PIN===null){ toast('Could not verify passcode — check your connection and reload.',true); return; }
  showModal('Passcode to '+action,
    '<input class="modal-search" type="password" id="pcInput" placeholder="Team PIN…" autocomplete="off"/>'+
    '<div class="note" id="pcErr" style="color:var(--red);display:none;margin:-6px 0 12px;">Incorrect PIN.</div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;">'+
    '<button class="btn btn-sm" id="pcCancel">Cancel</button>'+
    '<button class="btn btn-sm btn-primary" id="pcSubmit">Unlock</button></div>',
    (modal)=>{
      const inp=modal.querySelector('#pcInput'), err=modal.querySelector('#pcErr');
      inp.focus();
      const submit=()=>{
        if(inp.value===String(SITE_PIN)){
          sessionStorage.setItem('tactic_pw_ok','1');
          closeModal();
          cb();
        } else {
          err.style.display='block'; inp.value=''; inp.focus();
        }
      };
      modal.querySelector('#pcSubmit').onclick=submit;
      modal.querySelector('#pcCancel').onclick=closeModal;
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); submit(); } });
    });
}

// Small text-input modal, used in place of prompt() for naming a save.

    '<button class="btn btn-sm btn-primary" id="snSubmit">Save</button></div>',
    (modal)=>{
      const inp=modal.querySelector('#snInput');
      inp.focus();
      const submit=()=>{ const v=inp.value.trim(); if(!v)return; closeModal(); cb(v); };
      modal.querySelector('#snSubmit').onclick=submit;
      modal.querySelector('#snCancel').onclick=closeModal;
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); submit(); } });
    });
}

// Map a hero's role label (from the DB) to one of the position tabs.
// Handles synonyms: Jungle/Jungler, Midlane/Mid, Carry/Marksman, Support/Roam…
function roleToTab(role){
  const r=String(role||'').toLowerCase();
  if(r.includes('off'))return 'DSL';
  if(r.includes('jung'))return 'JUG';
  if(r.includes('mid'))return 'MID';
  if(r.includes('carry')||r.includes('marks')||r.includes('adc')||r.includes('dragon'))return 'ADL';
  if(r.includes('sup')||r.includes('roam'))return 'SUP';
  return null;
}

//  HERO PORTRAITS  (Cloudinary — mirrors the main app's heroImgUrl)
// ════════════════════════════════════════════════════════════════
function heroImgUrl(name){
  if(!name) return '';
  if(OVERRIDES[name]&&OVERRIDES[name].img) return OVERRIDES[name].img;   // custom upload
  const m=HERO_IMG_MAP[name];
  if(m) return HERO_IMG_BASE+(m.includes('/')?m:m+'.jpg');
  return HERO_IMG_BASE+encodeURIComponent(name)+'.jpg';
}
function initials(name){
  return (name||'?').split(/[ _'-]/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?';
}
// <img> that hides itself on error so the initials underneath show through.
function heroImgTag(name,extra){
  return '<img '+(extra||'')+' src="'+esc(heroImgUrl(name))+'" alt="'+esc(name)+'" '+
         'onerror="this.style.display=\'none\'" draggable="false"/>';
}

// ════════════════════════════════════════════════════════════════
//  DATA LOADING  (heroes + roles + image overrides — all from Supabase)
// ════════════════════════════════════════════════════════════════
async function loadData(){
  if(!sb){ document.getElementById('heroGrid').innerHTML=
    '<div class="note" style="grid-column:1/-1;">Supabase did not load — check your connection.</div>'; return; }

  // image / role overrides (best-effort; some heroes use a custom uploaded image)
  try{
    const {data}=await sb.from('app_settings').select('value').eq('key','hero_overrides').single();
    if(data&&data.value) OVERRIDES=data.value;
  }catch(e){ console.warn('overrides load failed',e); }

  // shared passcode — same PIN as the main site's Settings page. No matching
  // row just means the coach hasn't set a PIN yet (SITE_PIN=''), same as the
  // main site's own default — only a real query failure sets SITE_PIN=null.
  try{
    const {data,error}=await sb.from('app_settings').select('value').eq('key','settings_pin').limit(1);
    if(error)throw error;
    SITE_PIN=(data&&data.length&&data[0].value!=null)?data[0].value:'';
  }catch(e){ console.warn('site PIN load failed',e); SITE_PIN=null; }

  // hero list + roles
  try{
    const {data,error}=await sb.from('heroes').select('name,roles').order('name');
    if(error)throw error;
    state.heroes=data.map(h=>h.name).filter(Boolean);
    data.forEach(h=>{
      // a hero's roles can be overridden in app_settings; prefer those if present
      const ov=OVERRIDES[h.name];
      const roles=(ov&&ov.roles&&ov.roles.length)?ov.roles:(h.roles||[]);
      roles.forEach(r=>String(r).split('/').forEach(part=>{
        const tab=roleToTab(part); if(tab) addHeroPos(h.name,tab);
      }));
    });
  }catch(e){
    console.warn('heroes load failed',e);
    document.getElementById('heroGrid').innerHTML=
      '<div class="note" style="grid-column:1/-1;">Could not load heroes from the database.</div>';
  }
  renderHeroGrid();
}
function addHeroPos(hero,pos){ (state.heroPos[hero]=state.heroPos[hero]||new Set()).add(pos); }

function togglePanel(id){ document.getElementById(id).classList.toggle('collapsed'); requestResize(); }
function toggleBench(){ document.getElementById('bench').classList.toggle('collapsed'); requestResize(); }

function setEnvTab(t){
  document.querySelectorAll('.env-tabs .tab').forEach(x=>x.classList.toggle('active',x.dataset.env===t));
  document.getElementById('envSummons').style.display = t==='summons'?'':'none';
  document.getElementById('envTowers').style.display  = t==='towers'?'':'none';
}
function setTool(t){
  state.tool=t;
  ['drag','pen','eraser'].forEach(x=>document.getElementById('tool'+x[0].toUpperCase()+x.slice(1)).classList.toggle('active',x===t));
  const penActive=(t==='pen'||t==='eraser');
  document.getElementById('penOpts').classList.toggle('disabled',!penActive);
  // canvas only catches pointer events while drawing/erasing
  document.getElementById('drawCanvas').style.pointerEvents = penActive?'auto':'none';
}

// position tabs + swatches
function buildStaticUI(){
  const pt=document.getElementById('posTabs');
  ['All',...POSITIONS].forEach(p=>{
    const b=document.createElement('div'); b.className='tab'+(p==='All'?' active':''); b.textContent=p;
    b.onclick=()=>{ state.posFilter=p; document.querySelectorAll('#posTabs .tab').forEach(x=>x.classList.toggle('active',x.textContent===p)); renderHeroGrid(); };
    pt.appendChild(b);
  });
  const sw=document.getElementById('swatches');
  SWATCHES.forEach((c,i)=>{
    const s=document.createElement('span'); s.className='swatch'+(i===0?' active':''); s.style.background=c;
    s.onclick=()=>{ penState.color=c; document.querySelectorAll('#swatches .swatch').forEach(x=>x.classList.remove('active')); s.classList.add('active'); };
    sw.appendChild(s);
  });
  // summon source visuals + drag
  document.getElementById('vgVis').innerHTML=summonSVG('vanguard');
  document.getElementById('dsVis').innerHTML=summonSVG('darkslayer');
  document.querySelectorAll('.summon-src').forEach(el=>{
    el.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text/summon',el.dataset.summon); });
    el.addEventListener('click',()=>{
      const type=el.dataset.summon;
      if(state.pending&&state.pending.kind==='summon'&&state.pending.type===type){ cancelPending(); return; }
      startPending({kind:'summon',type});
    });
  });
  // hero cells are rendered via innerHTML (recent + full grid), so their click
  // is handled here via delegation rather than a per-cell listener/inline onclick.
  document.querySelector('#leftPanel .panel-body').addEventListener('click',e=>{
    const cell=e.target.closest('.hero-cell'); if(!cell)return;
    openHeroPick(e,cell.dataset.hero);
  });
  buildTowersTab();
}

// ════════════════════════════════════════════════════════════════
//  HERO GRID  (recent + filtered list)
// ════════════════════════════════════════════════════════════════
function recentHeroes(){ try{return JSON.parse(localStorage.getItem('tactic_recent')||'[]');}catch(e){return [];} }
function pushRecent(name){
  let r=recentHeroes().filter(n=>n!==name); r.unshift(name); r=r.slice(0,6);
  localStorage.setItem('tactic_recent',JSON.stringify(r));
}
function heroMatchesFilter(name){
  if(state.posFilter==='All')return true;
  const s=state.heroPos[name]; return s && s.has(state.posFilter);
}
function heroCellHTML(name){
  return '<div class="hero-cell" data-hero="'+esc(name)+'">'+
    '<div class="hero-portrait"><span class="init">'+esc(initials(name))+'</span>'+heroImgTag(name)+'</div>'+
    '<div class="nm">'+esc(name)+'</div></div>';
}
function renderHeroGrid(){
  const q=(document.getElementById('heroSearch').value||'').toLowerCase().trim();
  // recent strip
  const rec=recentHeroes().filter(n=>state.heroes.includes(n));
  const recWrap=document.getElementById('recentWrap');
  if(rec.length && !q){
    recWrap.innerHTML='<div class="section-label">Recent</div><div class="hero-grid">'+rec.map(heroCellHTML).join('')+'</div>';
  }else recWrap.innerHTML='';
  document.getElementById('allLabel').style.display=q?'none':'';
  const list=state.heroes.filter(n=>heroMatchesFilter(n) && (!q||n.toLowerCase().includes(q)));
  document.getElementById('heroGrid').innerHTML=list.map(heroCellHTML).join('') ||
    '<div class="note" style="grid-column:1/-1;">No heroes match.</div>';
}

// hero pick popup (blue/red -> bench)
let _pop=null;
function openHeroPick(ev,name){
  closePop();
  const p=document.createElement('div'); p.className='mini-pop';
  p.innerHTML='<div class="ph">'+esc(name)+'</div><div class="row">'+
    '<button class="btn btn-sm" style="border-color:var(--blue);color:var(--blue);" data-team="blue">Blue</button>'+
    '<button class="btn btn-sm" style="border-color:var(--red);color:var(--red);" data-team="red">Red</button></div>';
  document.body.appendChild(p);
  const x=Math.min(ev.clientX,window.innerWidth-150), y=Math.min(ev.clientY,window.innerHeight-90);
  p.style.left=x+'px'; p.style.top=y+'px';
  p.querySelectorAll('button').forEach(b=>b.onclick=()=>{ addToBench(name,b.dataset.team); pushRecent(name); renderHeroGrid(); closePop(); });
  _pop=p;
  setTimeout(()=>document.addEventListener('mousedown',popOutside),0);
}
function popOutside(e){ if(_pop && !_pop.contains(e.target))closePop(); }
function closePop(){ if(_pop){_pop.remove();_pop=null;document.removeEventListener('mousedown',popOutside);} }

//  BENCH
// ════════════════════════════════════════════════════════════════
function addToBench(hero,team){ state.bench[team].push({id:uid(),hero}); renderBench(); }
function benchTokenHTML(item,team){
  const sz=Math.round(state.tokenSize*0.85);
  return '<div class="bench-token '+team+'" draggable="true" data-id="'+item.id+'" data-team="'+team+'" title="drag to map, or tap then tap the map">'+
    '<button class="bt-rm" data-id="'+item.id+'" data-team="'+team+'" title="remove from bench">×</button>'+
    '<div class="ring" style="width:'+sz+'px;height:'+sz+'px;"><span class="init" style="font-size:'+Math.round(sz*0.34)+'px;">'+esc(initials(item.hero))+'</span>'+heroImgTag(item.hero)+'</div>'+
    '<div class="nm">'+esc(item.hero)+'</div></div>';
}
function renderBench(){
  ['blue','red'].forEach(team=>{
    const el=document.getElementById('bench'+team[0].toUpperCase()+team.slice(1));
    const arr=state.bench[team];
    el.innerHTML=arr.length?arr.map(it=>benchTokenHTML(it,team)).join(''):'<span class="bench-empty">empty</span>';
    el.querySelectorAll('.bench-token').forEach(node=>{
      const id=node.dataset.id;
      node.addEventListener('click',e=>{
        if(e.target.closest('.bt-rm'))return;
        if(state.pending&&state.pending.kind==='bench'&&state.pending.id===id){ cancelPending(); return; }
        const item=arr.find(x=>x.id===id); if(!item)return;
        startPending({kind:'bench',team,id,hero:item.hero});
      });
      node.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text/bench',JSON.stringify({team,id})); });
    });
    el.querySelectorAll('.bt-rm').forEach(btn=>{
      btn.addEventListener('click',e=>{ e.stopPropagation(); removeFromBench(btn.dataset.team,btn.dataset.id); });
    });
  });
}
function removeFromBench(team,id){ state.bench[team]=state.bench[team].filter(x=>x.id!==id); renderBench(); }

    '<rect x="4" y="26" width="16" height="3" rx="1.5" fill="'+col+'"/></svg>';
}
function towerVisible(t){ return state.towers[t.side][t.lane][t.tier]; }

function summonSVG(type){

    return '<svg width="36" height="36" viewBox="0 0 40 40"><g fill="#9b5cff" stroke="#5a2da8" stroke-width="1.5">'+

      '<rect x="16" y="20" width="8" height="4" fill="#2a1250"/></svg>';

  return '<svg width="36" height="36" viewBox="0 0 40 40"><g fill="#7a3df0" stroke="#3d1f80" stroke-width="1.5">'+
    '<path d="M20 10 C12 6 4 8 2 18 C8 16 10 18 12 22 C14 18 17 16 20 18 C23 16 26 18 28 22 C30 18 32 16 38 18 C36 8 28 6 20 10 Z"/>'+
    '<circle cx="20" cy="24" r="6"/></g><circle cx="17.5" cy="23" r="1.3" fill="#ffcf3a"/><circle cx="22.5" cy="23" r="1.3" fill="#ffcf3a"/></svg>';
}

function renderMap(){
  // remove previously injected elements (keep img + canvas)
  [...mapBox.querySelectorAll('.tower,.objective,.token,.summon-token')].forEach(n=>n.remove());

  // towers
  TOWER_POSITIONS.forEach(t=>{
    if(!towerVisible(t))return;
    const d=document.createElement('div'); d.className='tower';
    d.style.left=t.x+'%'; d.style.top=t.y+'%'; d.innerHTML=towerSVG(t.side);
    mapBox.appendChild(d);
  });

  // objectives
  if(state.objectives.slayer) mapBox.appendChild(objEl('slayer',state.slayerPos,false));
  if(state.objectives.dragon) mapBox.appendChild(objEl('dragon',state.dragonPos,true));

  // summons
  state.summons.forEach(s=>{
    const d=document.createElement('div'); d.className='summon-token'; d.id=s.id;
    d.style.left=(s.x*100)+'%'; d.style.top=(s.y*100)+'%'; d.innerHTML=summonSVG(s.type);
    enableSummonDrag(d,s);
    mapBox.appendChild(d);
  });

  // hero tokens
  state.mapHeroes.forEach(h=>mapBox.appendChild(tokenEl(h)));

  // canvas must stay on top → re-append
  mapBox.appendChild(canvas);
}
// dragon.png and slayer.png aren't square (slayer especially is much wider
// than tall) — size each box to its native ratio so object-fit:contain
// doesn't have to squeeze/letterbox it down.
const OBJECTIVE_SIZE={dragon:{w:40,h:36},slayer:{w:46,h:28}};
function objEl(type,pos,draggable){
  const d=document.createElement('div'); d.className='objective'+(draggable?' draggable':'');
  d.id=type+'Icon'; d.style.left=(pos.x*100)+'%'; d.style.top=(pos.y*100)+'%';
  const sz=OBJECTIVE_SIZE[type];
  d.style.width=sz.w+'px'; d.style.height=sz.h+'px';
  const file=type==='dragon'?'assets/dragon.png':'assets/slayer.png';
  d.innerHTML='<img src="'+file+'" alt="'+type+'"/>';
  if(draggable) enableObjectiveDrag(d);
  return d;
}
function tokenEl(h){
  const d=document.createElement('div'); d.className='token '+h.team; d.id=h.id;
  d.style.left=(h.x*100)+'%'; d.style.top=(h.y*100)+'%';
  d.style.width=state.tokenSize+'px';
  d.innerHTML='<div class="ring" style="width:'+state.tokenSize+'px;height:'+state.tokenSize+'px;">'+
    '<span class="init" style="font-size:'+Math.round(state.tokenSize*0.34)+'px;">'+esc(initials(h.hero))+'</span>'+heroImgTag(h.hero)+'</div>'+
    '<div class="lbl">'+esc(h.hero)+'</div>';
  enableTokenDrag(d,h);
  d.addEventListener('dblclick',e=>{ e.preventDefault(); sendTokenToBench(h); });
  d.addEventListener('contextmenu',e=>{ e.preventDefault(); openTokenMenu(h,e.clientX,e.clientY); });
  return d;
}
// right-click (desktop) or long-press (touch) → small menu instead of an
// instant, unconfirmed action.
function openTokenMenu(h,cx,cy){
  closePop();
  const otherTeam=h.team==='blue'?'red':'blue';
  const p=document.createElement('div'); p.className='mini-pop';
  p.innerHTML='<div class="ph">'+esc(h.hero)+'</div><div class="row">'+
    '<button class="btn btn-sm" data-act="swap">Switch to '+otherTeam.toUpperCase()+'</button>'+
    '<button class="btn btn-sm" data-act="bench">To bench</button></div>';
  document.body.appendChild(p);
  const x=Math.min(cx,window.innerWidth-170), y=Math.min(cy,window.innerHeight-90);
  p.style.left=x+'px'; p.style.top=y+'px';
  p.querySelector('[data-act="swap"]').onclick=()=>{ h.team=otherTeam; renderMap(); closePop(); };
  p.querySelector('[data-act="bench"]').onclick=()=>{ sendTokenToBench(h); closePop(); };
  _pop=p;
  setTimeout(()=>document.addEventListener('mousedown',popOutside),0);
}
function sendTokenToBench(h){
  state.mapHeroes=state.mapHeroes.filter(x=>x.id!==h.id);
  state.bench[h.team].push({id:uid(),hero:h.hero});
  renderMap(); renderBench();
}

// place a hero on the map at normalized x,y
function placeHero(hero,team,x,y){
  state.mapHeroes.push({id:uid(),hero,team,x,y});
  renderMap();
}

// ── Pointer-drag for things already ON the map ──
function clientToNorm(cx,cy){
  const r=mapBox.getBoundingClientRect();
  return {x:Math.max(0,Math.min(1,(cx-r.left)/r.width)), y:Math.max(0,Math.min(1,(cy-r.top)/r.height))};
}
function enableTokenDrag(el,h){
  el.addEventListener('pointerdown',e=>{
    if(state.tool!=='drag')return;          // only move heroes in Drag mode
    if(e.button!==0)return;
    e.preventDefault(); el.classList.add('dragging'); el.setPointerCapture(e.pointerId);
    const startX=e.clientX,startY=e.clientY; let moved=false;
    // holding still (no drag) for ~500ms opens the switch-team/bench menu —
    // this is the touch equivalent of a right-click.
    const lpTimer=setTimeout(()=>{
      if(moved)return;
      el.classList.remove('dragging'); el.releasePointerCapture(e.pointerId);
      el.removeEventListener('pointermove',move); el.removeEventListener('pointerup',up);
      openTokenMenu(h,startX,startY);
    },500);
    const move=ev=>{
      if(!moved&&(Math.abs(ev.clientX-startX)>6||Math.abs(ev.clientY-startY)>6)){ moved=true; clearTimeout(lpTimer); }
      const n=clientToNorm(ev.clientX,ev.clientY); h.x=n.x;h.y=n.y; el.style.left=(n.x*100)+'%'; el.style.top=(n.y*100)+'%';
    };
    const up=ev=>{ clearTimeout(lpTimer); el.classList.remove('dragging'); el.releasePointerCapture(e.pointerId); el.removeEventListener('pointermove',move); el.removeEventListener('pointerup',up); };
    el.addEventListener('pointermove',move); el.addEventListener('pointerup',up);
  });
}
function enableObjectiveDrag(el){      // dragon — draggable at all times
  el.addEventListener('pointerdown',e=>{
    if(e.button!==0)return; e.preventDefault(); el.setPointerCapture(e.pointerId); el.style.cursor='grabbing';
    const move=ev=>{ const n=clientToNorm(ev.clientX,ev.clientY); state.dragonPos={x:n.x,y:n.y}; el.style.left=(n.x*100)+'%'; el.style.top=(n.y*100)+'%'; };
    const up=()=>{ el.style.cursor='grab'; el.releasePointerCapture(e.pointerId); el.removeEventListener('pointermove',move); el.removeEventListener('pointerup',up); };
    el.addEventListener('pointermove',move); el.addEventListener('pointerup',up);
  });
}
function enableSummonDrag(el,s){        // summon tokens — draggable any time
  el.addEventListener('pointerdown',e=>{
    if(e.button!==0)return; e.preventDefault(); el.classList.add('dragging'); el.setPointerCapture(e.pointerId);
    const move=ev=>{ const n=clientToNorm(ev.clientX,ev.clientY); s.x=n.x;s.y=n.y; el.style.left=(n.x*100)+'%'; el.style.top=(n.y*100)+'%'; };
    const up=ev=>{
      el.classList.remove('dragging'); el.releasePointerCapture(e.pointerId);
      el.removeEventListener('pointermove',move); el.removeEventListener('pointerup',up);
      // dropped over trash zone? delete
      const tz=document.getElementById('trashZone').getBoundingClientRect();
      if(ev.clientX>=tz.left&&ev.clientX<=tz.right&&ev.clientY>=tz.top&&ev.clientY<=tz.bottom){
        state.summons=state.summons.filter(x=>x.id!==s.id); renderMap();
      }
      document.getElementById('trashZone').classList.remove('over');
    };
    el.addEventListener('pointermove',ev=>{
      const tz=document.getElementById('trashZone').getBoundingClientRect();
      document.getElementById('trashZone').classList.toggle('over', ev.clientX>=tz.left&&ev.clientX<=tz.right&&ev.clientY>=tz.top&&ev.clientY<=tz.bottom);
    });
    el.addEventListener('pointermove',move); el.addEventListener('pointerup',up);
  });
}

// ── Native drag-and-drop: spawn things onto the map ──
mapBox.addEventListener('dragover',e=>e.preventDefault());
mapBox.addEventListener('drop',e=>{
  e.preventDefault();
  const n=clientToNorm(e.clientX,e.clientY);
  const bench=e.dataTransfer.getData('text/bench');
  const summon=e.dataTransfer.getData('text/summon');
  if(bench){
    const {team,id}=JSON.parse(bench);
    const item=state.bench[team].find(x=>x.id===id); if(!item)return;
    removeFromBench(team,id);
    placeHero(item.hero,team,n.x,n.y);
  }else if(summon){
    state.summons.push({id:uid(),type:summon,x:n.x,y:n.y}); renderMap();
  }
});

// ── Tap-to-place: touch-friendly alternative to the native drag above.
// Tap a bench token or a summon source to select it, then tap the map to
// place it there. Tapping the same source again (or Escape, or tapping
// anywhere outside the map/bench/summon list) cancels the selection. ──
function startPending(p){

  highlightPending();
  mapBox.style.cursor='crosshair';
  const label=p.kind==='bench'?p.hero:(p.type==='vanguard'?'Vanguard':'Summoned Darkslayer');
  toast('Tap the map to place '+label+' — tap it again to cancel.');

function cancelPending(){
  state.pending=null;
  mapBox.style.cursor='';
  document.querySelectorAll('.selected-for-place').forEach(n=>n.classList.remove('selected-for-place'));
}
function highlightPending(){
  document.querySelectorAll('.selected-for-place').forEach(n=>n.classList.remove('selected-for-place'));
  if(!state.pending)return;
  const sel=state.pending.kind==='bench'
    ? '.bench-token[data-id="'+state.pending.id+'"]'
    : '.summon-src[data-summon="'+state.pending.type+'"]';
  const el=document.querySelector(sel); if(el)el.classList.add('selected-for-place');
}
mapBox.addEventListener('click',e=>{
  if(!state.pending)return;
  const n=clientToNorm(e.clientX,e.clientY);
  if(state.pending.kind==='bench'){
    const {team,id,hero}=state.pending;
    removeFromBench(team,id);
    placeHero(hero,team,n.x,n.y);
  }else{
    state.summons.push({id:uid(),type:state.pending.type,x:n.x,y:n.y}); renderMap();
  }
  cancelPending();
});
document.addEventListener('click',e=>{
  if(!state.pending)return;
  if(e.target.closest('#mapBox')||e.target.closest('.bench-token')||e.target.closest('.summon-src'))return;

});

// ════════════════════════════════════════════════════════════════
//  TOKEN SIZE SLIDER (right panel header injected)
// ════════════════════════════════════════════════════════════════
function setTokenSize(v){ state.tokenSize=+v; document.getElementById('tokSizeVal').textContent=v+'px'; renderBench(); renderMap(); }

// ════════════════════════════════════════════════════════════════
//  DRAWING SYSTEM (canvas overlay)
// ════════════════════════════════════════════════════════════════
function resizeCanvas(){
  const r=mapBox.getBoundingClientRect();
  canvas.width=r.width; canvas.height=r.height;
  redraw();
}
function redraw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  state.strokes.forEach(drawStroke);
}
// paints one segment (or a dot, if from===to) straight onto the canvas
// without clearing it — used both to replay a whole stroke (redraw) and to
// draw just the newest bit while the pen is moving (fast path below).
function paintSegment(s,from,to){
  ctx.save();
  ctx.globalCompositeOperation = s.erase?'destination-out':'source-over';
  ctx.strokeStyle=s.color; ctx.fillStyle=s.color; ctx.lineWidth=s.size; ctx.lineCap='round'; ctx.lineJoin='round';
  const fx=from.x*canvas.width, fy=from.y*canvas.height, tx=to.x*canvas.width, ty=to.y*canvas.height;
  if(fx===tx&&fy===ty){
    ctx.beginPath(); ctx.arc(tx,ty,s.size/2,0,Math.PI*2); ctx.fill();
  }else{
    ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty); ctx.stroke();
  }
  ctx.restore();
}
function drawStroke(s){
  if(!s.pts.length)return;
  if(s.pts.length===1){ paintSegment(s,s.pts[0],s.pts[0]); return; }
  for(let i=1;i<s.pts.length;i++) paintSegment(s,s.pts[i-1],s.pts[i]);
}
let _cur=null;
canvas.addEventListener('pointerdown',e=>{
  if(state.tool!=='pen'&&state.tool!=='eraser')return;
  e.preventDefault(); canvas.setPointerCapture(e.pointerId);
  const n=clientToNorm(e.clientX,e.clientY);
  _cur={color:penState.color,size:penState.size,erase:state.tool==='eraser',pts:[n]};
  state.strokes.push(_cur); state.redo=[];
  paintSegment(_cur,n,n);
});
canvas.addEventListener('pointermove',e=>{
  if(!_cur)return;
  const n=clientToNorm(e.clientX,e.clientY);
  const prev=_cur.pts[_cur.pts.length-1];
  _cur.pts.push(n);
  paintSegment(_cur,prev,n);
});
function endStroke(){ if(_cur)_cur=null; }
canvas.addEventListener('pointerup',endStroke);
canvas.addEventListener('pointercancel',endStroke);

function undoStroke(){ if(state.strokes.length){ state.redo.push(state.strokes.pop()); redraw(); } }
function redoStroke(){ if(state.redo.length){ state.strokes.push(state.redo.pop()); redraw(); } }
function clearDrawing(){ state.strokes=[]; state.redo=[]; redraw(); }

// keyboard hotkeys: A/S/D for tools, Ctrl/Cmd+S/Z/Y for save/undo/redo, Escape to back out
document.addEventListener('keydown',e=>{
  const t=e.target;
  if(/input|textarea|select/i.test(t.tagName)||t.isContentEditable)return;
  if(e.ctrlKey||e.metaKey){
    const k=e.key.toLowerCase();
    if(k==='s'){ e.preventDefault(); openSave(); }
    else if(k==='z'&&!e.shiftKey){ e.preventDefault(); undoStroke(); }
    else if((k==='z'&&e.shiftKey)||k==='y'){ e.preventDefault(); redoStroke(); }
    return;
  }
  if(e.key==='Escape'){ cancelPending(); closePop(); closeModal(); return; }
  const k=e.key.toLowerCase();
  if(k==='a')setTool('drag');
  else if(k==='s')setTool('pen');
  else if(k==='d')setTool('eraser');
});

// ════════════════════════════════════════════════════════════════
//  LAYOUT / RESIZE — keep map box at the map's aspect ratio
// ════════════════════════════════════════════════════════════════
let _rt=null;
function requestResize(){ clearTimeout(_rt); _rt=setTimeout(layoutMap,60); }
function layoutMap(){
  const wrap=document.getElementById('mapWrap');
  const pad=16;
  const availW=wrap.clientWidth-pad, availH=wrap.clientHeight-pad;
  const asp=mapImgAspect||MAP_ASPECT;       // h/w
  let w=availW, h=w*asp;
  if(h>availH){ h=availH; w=h/asp; }
  mapBox.style.width=w+'px'; mapBox.style.height=h+'px';
  resizeCanvas();
}
let mapImgAspect=null;
const mapImg=document.getElementById('mapImg');
mapImg.addEventListener('load',()=>{ mapImgAspect=mapImg.naturalHeight/mapImg.naturalWidth; layoutMap(); });
window.addEventListener('resize',requestResize);

//  SAVE / LOAD  (Supabase: tactic_scenarios)
// ════════════════════════════════════════════════════════════════
function boardState(){
  return {
    heroes:state.mapHeroes.map(h=>({id:h.id,hero:h.hero,team:h.team,x:+h.x.toFixed(4),y:+h.y.toFixed(4),size:state.tokenSize})),
    summons:state.summons.map(s=>({type:s.type,x:+s.x.toFixed(4),y:+s.y.toFixed(4)})),
    strokes:state.strokes,
    towers:state.towers,
    objectives:state.objectives,
    dragonPos:state.dragonPos,
    tokenSize:state.tokenSize
  };
}
function applyBoardState(bs){
  if(!bs)return;
  state.tokenSize=bs.tokenSize||(bs.heroes&&bs.heroes[0]&&bs.heroes[0].size)||40;
  document.getElementById('tokSize').value=state.tokenSize; setTokenSize(state.tokenSize);
  state.mapHeroes=(bs.heroes||[]).map(h=>({id:uid(),hero:h.hero,team:h.team,x:h.x,y:h.y}));
  state.summons=(bs.summons||[]).map(s=>({id:uid(),type:s.type,x:s.x,y:s.y}));
  state.strokes=bs.strokes||[]; state.redo=[];
  if(bs.towers)state.towers=bs.towers;
  if(bs.objectives)state.objectives=bs.objectives;
  if(bs.dragonPos)state.dragonPos=bs.dragonPos;
  ['dragon','slayer'].forEach(o=>document.getElementById('tgl'+o[0].toUpperCase()+o.slice(1)).classList.toggle('on',!!state.objectives[o]));
  syncTowerCheckboxes(); renderMap(); redraw();
}

// build a 400x244 preview thumbnail
function buildPreview(){
  const W=400,H=244, c=document.createElement('canvas'); c.width=W;c.height=H;
  const x=c.getContext('2d');
  x.fillStyle='#0a0a0a'; x.fillRect(0,0,W,H);
  try{ x.drawImage(mapImg,0,0,W,H); }catch(e){}
  // hero tokens as colored dots
  state.mapHeroes.forEach(h=>{
    x.beginPath(); x.arc(h.x*W,h.y*H,9,0,Math.PI*2); x.fillStyle=h.team==='blue'?'#4488FF':'#FF4444'; x.fill();
    x.fillStyle='#fff'; x.font='8px monospace'; x.textAlign='center'; x.textBaseline='middle';
    x.fillText(initials(h.hero),h.x*W,h.y*H);
  });
  // strokes
  state.strokes.forEach(s=>{
    if(s.erase)return; x.strokeStyle=s.color; x.lineWidth=Math.max(1,s.size*(W/canvas.width||0.5)); x.lineCap='round'; x.beginPath();
    s.pts.forEach((p,i)=>{ const px=p.x*W,py=p.y*H; i?x.lineTo(px,py):x.moveTo(px,py); }); x.stroke();
  });
  return c.toDataURL('image/jpeg',0.7);
}

function openSave(){
  if(!sb)return toast('Supabase library not loaded.',true);
  gate('save',()=>{
    openSaveNameModal(async(name)=>{
      const payload={name,board_state:boardState(),preview_image:buildPreview(),updated_at:new Date().toISOString()};
      toast('Saving…');
      // try update-by-name first, else insert (works whether or not a unique constraint exists)
      const {data:existing,error:selErr}=await sb.from('tactic_scenarios').select('id').eq('name',payload.name).limit(1);
      if(selErr)return toast('Save failed: '+selErr.message,true);
      let res;
      if(existing&&existing.length){ res=await sb.from('tactic_scenarios').update(payload).eq('id',existing[0].id); }
      else { res=await sb.from('tactic_scenarios').insert(payload); }
      if(res.error)return toast('Save failed: '+res.error.message,true);
      toast('Saved “'+payload.name+'”');
    });
  });
}

async function openLoad(){
  if(!sb)return toast('Supabase library not loaded.',true);
  const {data,error}=await sb.from('tactic_scenarios').select('*').order('updated_at',{ascending:false});
  if(error)return toast('Load failed: '+error.message,true);
  showModal('Load scenario',
    !data.length ? '<div class="note">No saved scenarios yet.</div>' :
    '<div class="scenario-grid">'+data.map(s=>
      '<div class="scenario-card" data-id="'+s.id+'">'+
      '<img src="'+(s.preview_image||'')+'" alt="" onerror="this.style.background=\'#111\'"/>'+
      '<div class="cap"><span>'+esc(s.name)+'</span><span class="del" data-del="'+s.id+'" title="delete">✕</span></div></div>'
    ).join('')+'</div>',
    (modal)=>{
      modal.querySelectorAll('.scenario-card').forEach(card=>{
        card.addEventListener('click',e=>{
          if(e.target.dataset.del)return;
          const rec=data.find(d=>String(d.id)===card.dataset.id);
          applyBoardState(rec.board_state); closeModal(); toast('Loaded “'+rec.name+'”');
        });
      });
      modal.querySelectorAll('.del').forEach(d=>d.addEventListener('click',e=>{
        e.stopPropagation();
        const delId=d.dataset.del;
        const rec=data.find(x=>String(x.id)===delId);
        gate('delete',()=>{
          openConfirmModal('Delete scenario','Delete “'+(rec?rec.name:'this scenario')+'”? This cannot be undone.',async()=>{
            const {error}=await sb.from('tactic_scenarios').delete().eq('id',delId);
            if(error){ toast('Delete failed: '+error.message,true); openLoad(); return; }
            toast('Deleted “'+(rec?rec.name:'')+'”');
            openLoad(); // refresh the list from the DB rather than trusting local removal
          });
        });
      }));
    });
}

// ════════════════════════════════════════════════════════════════
//  IMPORT DRAFT  (from DraftLab's saved series — localStorage 'dl_scenarios_v2')
//  DraftLab side B = Blue, side R = Red. Each saved series holds one or more
//  games; we flatten them into a pick-list the user can choose from.
// ════════════════════════════════════════════════════════════════
function dlSavedGames(){
  let scns=[]; try{ scns=JSON.parse(localStorage.getItem('dl_scenarios_v2')||'[]'); }catch(e){ console.warn('Failed to parse draft saves:',e); }
  const order={DSL:0,JUG:1,MID:2,ADL:3,SUP:4};
  const picks=(actions,side,roles)=>(actions||[])
    .filter(a=>a.type==='pick'&&a.side===side&&a.hero)
    .map(a=>({hero:a.hero,role:(roles&&roles[a.n])||''}))
    .sort((x,y)=>(order[x.role]??9)-(order[y.role]??9))
    .map(p=>p.hero);
  const games=[];
  scns.forEach(s=>{
    const gs=[...(s.series||[])];
    if(s.current&&s.current.actions&&s.current.actions.some(a=>a.type==='pick'&&a.hero))
      gs.push({actions:s.current.actions,rolesB:s.current.rolesB,rolesR:s.current.rolesR});
    gs.forEach((g,i)=>games.push({
      scn:s.name||'Unnamed series', date:s.date||'', gameNum:i+1,
      teamB:(s.teams&&s.teams.B)||'Blue', teamR:(s.teams&&s.teams.R)||'Red',
      blue:picks(g.actions,'B',g.rolesB), red:picks(g.actions,'R',g.rolesR)
    }));
  });
  return games.filter(g=>g.blue.length||g.red.length);
}
function openImport(){
  const games=dlSavedGames();
  if(!games.length)return toast('No DraftLab saves found — save a draft in DraftLab first.',true);
  const rowHTML=(g,i)=>'<div class="import-row" data-id="'+i+'">'+
    '<span class="date">'+esc(g.date)+'</span>'+
    '<span class="vs">'+esc(g.teamB)+' vs '+esc(g.teamR)+'</span>'+
    '<span class="gm">Game '+g.gameNum+' · '+esc(g.scn)+'</span></div>';
  showModal('Import draft (from DraftLab)',
    '<input class="modal-search" id="impSearch" placeholder="search team / series / date…"/>'+
    '<div class="import-list" id="impList">'+games.map(rowHTML).join('')+'</div>',
    (modal)=>{
      const list=modal.querySelector('#impList');
      modal.querySelector('#impSearch').addEventListener('input',function(){
        const q=this.value.toLowerCase();
        list.querySelectorAll('.import-row').forEach(r=>{ r.style.display=r.textContent.toLowerCase().includes(q)?'':'none'; });
      });
      list.querySelectorAll('.import-row').forEach(r=>r.addEventListener('click',()=>{
        importGame(games[+r.dataset.id]); closeModal();
      }));
    });
}
function importGame(g){
  state.bench.blue=g.blue.map(h=>({id:uid(),hero:h}));
  state.bench.red =g.red.map(h=>({id:uid(),hero:h}));
  renderBench();
  toast('Imported '+g.teamB+' vs '+g.teamR+' (Game '+g.gameNum+') → bench');
}

// ════════════════════════════════════════════════════════════════
//  MODAL + TOAST helpers
// ════════════════════════════════════════════════════════════════
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
let _modal=null;
function showModal(title,bodyHTML,after){
  closeModal();
  const bg=document.createElement('div'); bg.className='modal-bg';
  bg.innerHTML='<div class="modal"><div class="modal-head"><h2>'+esc(title)+'</h2><button class="x">×</button></div><div class="modal-body">'+bodyHTML+'</div></div>';
  document.body.appendChild(bg); _modal=bg;
  bg.querySelector('.x').onclick=closeModal;
  bg.addEventListener('mousedown',e=>{ if(e.target===bg)closeModal(); });
  if(after)after(bg);
}
function closeModal(){ if(_modal){_modal.remove();_modal=null;} }
function toast(msg,err){
  const t=document.createElement('div'); t.className='toast'+(err?' err':''); t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),err?4200:2200);
}

// ════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════
function injectSizeRow(){
  // token-size slider lives at the top of the right panel body
  const body=document.querySelector('#rightPanel .panel-body');
  const row=document.createElement('div'); row.className='size-row';
  row.innerHTML='<label>Token size (bench + map)</label><div class="rr">'+
    '<input type="range" id="tokSize" min="20" max="80" value="40" oninput="setTokenSize(this.value)"/>'+
    '<span class="val" id="tokSizeVal">40px</span></div>';
  const tabs=body.querySelector('.env-tabs');                 // place right after the tabs
  body.insertBefore(row, tabs ? tabs.nextSibling : body.firstChild);
}

(function boot(){
  buildStaticUI();
  injectSizeRow();
  setTool('drag');
  renderBench();
  renderMap();
  layoutMap();
  loadData();
  // observe map area size changes (panel collapse etc.)
  if(window.ResizeObserver){ new ResizeObserver(requestResize).observe(document.getElementById('mapWrap')); }
})();
</script>
